<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Calorie Checker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Calorie Checker</h1>
      <p class="subtitle">Upload a food photo — get calories or compare against your homemade classics.</p>
    </header>

    <!-- Tab switcher -->
    <div class="tab-bar" role="tablist">
      <button class="tab active" data-mode="check" role="tab" aria-selected="true">
        &#128247; Calorie Check
      </button>
      <button class="tab" data-mode="compare" role="tab" aria-selected="false">
        &#9878; Compare to My Classic
      </button>
    </div>

    <!-- Compare mode: baseline selector -->
    <div id="baseline-row" class="baseline-row hidden">
      <label for="baseline-select">Compare against:</label>
      <select id="baseline-select">
        <option value="auto">&#128269; Auto-detect best match</option>
        {% for key, label in baselines.items() %}
        <option value="{{ key }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Upload area -->
    <div id="upload-area" class="upload-area" role="button" tabindex="0" aria-label="Upload food image">
      <div class="upload-icon">&#128247;</div>
      <p class="upload-text">Drag &amp; drop a food photo here</p>
      <p class="upload-hint">or click to browse &mdash; JPG, PNG, WEBP, GIF up to 10 MB</p>
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/gif,image/webp" hidden />
    </div>

    <!-- Preview -->
    <div id="preview-area" class="preview-area hidden">
      <img id="preview-img" src="" alt="Food preview" />
      <button id="change-btn" class="btn-secondary">Choose a different photo</button>
    </div>

    <!-- Action button -->
    <button id="analyze-btn" class="btn-primary hidden">Analyze Calories</button>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="loading-msg">Analyzing your food with AI&hellip;</p>
    </div>

    <!-- Error -->
    <div id="error-box" class="error-box hidden" role="alert"></div>

    <!-- Results -->
    <div id="results" class="results hidden"></div>
  </div>

  <script>
    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let selectedFile = null;
    let currentMode  = 'check'; // 'check' | 'compare'

    // -----------------------------------------------------------------------
    // Element refs
    // -----------------------------------------------------------------------
    const tabs          = document.querySelectorAll('.tab');
    const baselineRow   = document.getElementById('baseline-row');
    const baselineSelect= document.getElementById('baseline-select');
    const uploadArea    = document.getElementById('upload-area');
    const fileInput     = document.getElementById('file-input');
    const previewArea   = document.getElementById('preview-area');
    const previewImg    = document.getElementById('preview-img');
    const changeBtn     = document.getElementById('change-btn');
    const analyzeBtn    = document.getElementById('analyze-btn');
    const loading       = document.getElementById('loading');
    const loadingMsg    = document.getElementById('loading-msg');
    const errorBox      = document.getElementById('error-box');
    const results       = document.getElementById('results');

    // -----------------------------------------------------------------------
    // Tab switching
    // -----------------------------------------------------------------------
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        currentMode = tab.dataset.mode;
        baselineRow.classList.toggle('hidden', currentMode !== 'compare');
        analyzeBtn.textContent = currentMode === 'compare'
          ? '⇌ Compare to My Classic'
          : 'Analyze Calories';
        results.classList.add('hidden');
        hideError();
      });
    });

    // -----------------------------------------------------------------------
    // File selection
    // -----------------------------------------------------------------------
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') fileInput.click();
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files && fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    uploadArea.addEventListener('dragover', e => {
      e.preventDefault(); uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault(); uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError('Please select an image file (JPG, PNG, WEBP, or GIF).');
        return;
      }
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        uploadArea.classList.add('hidden');
        previewArea.classList.remove('hidden');
        analyzeBtn.classList.remove('hidden');
        analyzeBtn.textContent = currentMode === 'compare' ? '⇌ Compare to My Classic' : 'Analyze Calories';
        hideError();
        results.classList.add('hidden');
      };
      reader.readAsDataURL(file);
    }

    changeBtn.addEventListener('click', resetToUpload);

    function resetToUpload() {
      selectedFile = null;
      fileInput.value = '';
      previewImg.src  = '';
      previewArea.classList.add('hidden');
      analyzeBtn.classList.add('hidden');
      uploadArea.classList.remove('hidden');
      results.classList.add('hidden');
      hideError();
    }

    // -----------------------------------------------------------------------
    // Submit
    // -----------------------------------------------------------------------
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      showLoading(currentMode === 'compare'
        ? 'Agent is analyzing and comparing — this may take a moment…'
        : 'Analyzing your food with AI…');
      hideError();
      results.classList.add('hidden');

      const formData = new FormData();
      formData.append('image', selectedFile);
      if (currentMode === 'compare') {
        formData.append('baseline', baselineSelect.value);
      }

      const endpoint = currentMode === 'compare' ? '/compare' : '/analyze';

      try {
        const res  = await fetch(endpoint, { method: 'POST', body: formData });
        const data = await res.json();
        hideLoading();
        if (data.error) {
          showError(data.error);
        } else if (currentMode === 'compare') {
          renderCompare(data);
        } else {
          renderCalories(data);
        }
      } catch (err) {
        hideLoading();
        showError('Network error. Please check your connection and try again.');
      }
    });

    // -----------------------------------------------------------------------
    // Render: calorie check
    // -----------------------------------------------------------------------
    function renderCalories(data) {
      if (!data.foods || data.foods.length === 0) {
        results.innerHTML = noFoodHtml();
        results.classList.remove('hidden');
        return;
      }

      const mealLabel = data.meal_type_guess
        ? data.meal_type_guess.charAt(0).toUpperCase() + data.meal_type_guess.slice(1)
        : '';

      const rows = data.foods.map(f => `
        <tr>
          <td class="food-name">${h(f.name)}</td>
          <td>${h(f.portion_estimate)}</td>
          <td class="calories-cell">${f.calories} kcal</td>
          <td><span class="badge badge-${h(f.confidence)}">${h(f.confidence)}</span></td>
          <td class="notes-cell">${h(f.notes || '')}</td>
        </tr>`).join('');

      results.innerHTML = `
        <div class="total-card">
          <div class="total-label">Total Estimated Calories</div>
          <div class="total-value">${data.total_calories} <span class="kcal">kcal</span></div>
          ${mealLabel && mealLabel !== 'Unknown' ? `<div class="meal-type">${mealLabel}</div>` : ''}
        </div>
        <div class="table-wrapper">
          <table class="foods-table">
            <thead><tr><th>Food</th><th>Portion</th><th>Calories</th><th>Confidence</th><th>Notes</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${data.disclaimer ? `<p class="disclaimer">&#9432; ${h(data.disclaimer)}</p>` : ''}
        <button class="btn-secondary retry-btn" onclick="resetToUpload()">Analyze another photo</button>`;

      results.classList.remove('hidden');
    }

    // -----------------------------------------------------------------------
    // Render: compare
    // -----------------------------------------------------------------------
    function renderCompare(data) {
      const delta     = data.calorie_delta;
      const absDelta  = Math.abs(delta);
      const direction = data.delta_direction; // 'more' | 'fewer' | 'same'
      const pct       = data.delta_percent;
      const verdict   = data.verdict;         // 'higher' | 'lower' | 'similar'

      const deltaClass = verdict === 'higher' ? 'delta-higher'
                       : verdict === 'lower'  ? 'delta-lower'
                       : 'delta-similar';

      const deltaSign  = verdict === 'higher' ? '+' : verdict === 'lower' ? '−' : '±';
      const deltaIcon  = verdict === 'higher' ? '▲' : verdict === 'lower' ? '▼' : '≈';

      // Analyzed foods rows
      const analyzedRows = (data.analyzed_foods || []).map(f => `
        <tr>
          <td class="food-name">${h(f.name)}</td>
          <td>${h(f.portion_estimate)}</td>
          <td class="calories-cell">${f.calories} kcal</td>
          <td><span class="badge badge-${h(f.confidence)}">${h(f.confidence)}</span></td>
        </tr>`).join('');

      // Item comparison observations
      const compItems = (data.item_comparisons || []).map(s =>
        `<li>${h(s)}</li>`).join('');

      // Macro delta rows (only show if present)
      const md = data.macro_deltas || {};
      const macroRows = ['protein_g', 'carbs_g', 'fat_g'].map(k => {
        if (md[k] == null) return '';
        const val = md[k];
        const sign = val > 0 ? '+' : '';
        const cls  = Math.abs(val) < 2 ? '' : val > 0 ? 'macro-up' : 'macro-down';
        const label = k === 'protein_g' ? 'Protein' : k === 'carbs_g' ? 'Carbs' : 'Fat';
        return `<tr><td>${label}</td><td class="${cls}">${sign}${val}g</td></tr>`;
      }).join('');

      results.innerHTML = `
        <!-- Delta hero card -->
        <div class="delta-card ${deltaClass}">
          <div class="delta-icon">${deltaIcon}</div>
          <div class="delta-calories">${deltaSign}${absDelta} kcal</div>
          <div class="delta-label">
            This meal has <strong>${absDelta} kcal ${direction}</strong>
            than your <em>${h(data.baseline_label)}</em>
            (${deltaSign}${pct}%)
          </div>
        </div>

        <!-- Side-by-side summary -->
        <div class="compare-summary">
          <div class="summary-box summary-analyzed">
            <div class="summary-title">&#127869; This Photo</div>
            <div class="summary-calories">${data.analyzed_total_calories} kcal</div>
          </div>
          <div class="summary-vs">vs</div>
          <div class="summary-box summary-baseline">
            <div class="summary-title">&#127968; ${h(data.baseline_label)}</div>
            <div class="summary-calories">${data.baseline_total_calories} kcal</div>
          </div>
        </div>

        <!-- Narrative -->
        <div class="narrative-box">
          <p>${h(data.narrative)}</p>
        </div>

        <!-- Analyzed breakdown -->
        <h3 class="section-heading">What the AI saw in the photo</h3>
        <div class="table-wrapper">
          <table class="foods-table">
            <thead><tr><th>Food</th><th>Portion</th><th>Calories</th><th>Confidence</th></tr></thead>
            <tbody>${analyzedRows || '<tr><td colspan="4" style="text-align:center;color:#9ca3af">No food detected</td></tr>'}</tbody>
          </table>
        </div>

        ${macroRows ? `
        <!-- Macro deltas -->
        <h3 class="section-heading">Macro differences vs your classic</h3>
        <div class="table-wrapper">
          <table class="foods-table macro-table">
            <thead><tr><th>Nutrient</th><th>Delta</th></tr></thead>
            <tbody>${macroRows}</tbody>
          </table>
        </div>` : ''}

        ${compItems ? `
        <!-- Item observations -->
        <h3 class="section-heading">Key differences noted</h3>
        <ul class="item-list">${compItems}</ul>` : ''}

        ${data.disclaimer ? `<p class="disclaimer">&#9432; ${h(data.disclaimer)}</p>` : ''}

        <button class="btn-secondary retry-btn" onclick="resetToUpload()">Compare another photo</button>`;

      results.classList.remove('hidden');
    }

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------
    function noFoodHtml() {
      return `<div class="no-food">
        <div class="no-food-icon">&#129300;</div>
        <p>No food detected in this image.</p>
        <p class="no-food-hint">Try a clearer photo with food in frame.</p>
      </div>`;
    }

    function showLoading(msg) {
      loadingMsg.textContent = msg;
      analyzeBtn.classList.add('hidden');
      loading.classList.remove('hidden');
    }

    function hideLoading() {
      loading.classList.add('hidden');
      analyzeBtn.classList.remove('hidden');
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    function hideError() {
      errorBox.classList.add('hidden');
      errorBox.textContent = '';
    }

    function h(str) { // XSS-safe HTML escape
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
